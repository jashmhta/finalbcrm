# CI — Binary Capital CRM (Track B: production readiness)
#
# Pipeline: install → lint → typecheck → build → test (vitest) →
#           drizzle-kit generate check (migration drift).
#
# Keeps `next build` clean and prevents schema/migration drift before any
# deploy to the India-hosted paths (Vercel bom1 / ap-south-1 containers).
# ARCHITECTURE.md §2.3 + §10 (environments parity).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Typecheck · Build · Test · Migration drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Build does not open a real DB connection (routes are force-dynamic per
      # app/AGENTS.md), but the db/auth modules read these at import time, so
      # provide non-empty placeholders to keep `next build` hermetic.
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/binary_crm?sslmode=disable"
      DATABASE_URL_UNPOOLED: "postgresql://ci:ci@127.0.0.1:5432/binary_crm?sslmode=disable"
      AUTH_SECRET: "ci-build-placeholder-not-a-real-secret-000000000000"
      AUTH_URL: "http://localhost:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # drizzle-kit generate check needs the full history-free tree but
          # DOES need an unmodified working tree to diff against; fetch-depth 1
          # is fine because we only diff post-generate changes, not history.
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (next build)
        run: npm run build

      - name: Test (vitest)
        run: npx vitest run

      - name: Drizzle generate check (migration drift)
        run: |
          set -euo pipefail
          npx drizzle-kit generate
          if ! git diff --exit-code -- drizzle/; then
            echo "::error::drizzle/ has uncommitted migration changes after \`drizzle-kit generate\`."
            echo "::error::The schema and migrations are out of sync — run \`npm run db:generate\`"
            echo "::error::locally, review the generated SQL, and commit the new migration + meta files."
            git --no-pager diff --stat -- drizzle/
            exit 1
          fi
          echo "Schema and migrations are in sync."
